# Azozo Model & System Configuration

providers:
  xah:
    base_url: "https://api.xah.io/v1"
    api_key_env: "XAH_API_KEY"
  vilao:
    base_url: "https://api.vilao.ai/v1"
    api_key_env: "LLM_API_KEY"
  nvidia:
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key_env: "NVIDIA_API_KEY"
  deepseek:
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
  commandcode:
    base_url: "https://api.commandcode.ai/provider/v1"
    api_key_env: "CMD_API_KEY"

models:
  ocr:
    model_name: "phatchau036/minimax-m3"
    provider: "xah"
    batch_size: 6
    thinking: disabled
    concurrency: 5
    description: "Vision LLM model for converting PDF pages to markdown text"

  parser:
    model_name: "deepseek/deepseek-v4-pro"
    provider: "commandcode"
    thinking: disabled
    description: "Sequence labeling LLM model for question stem and option annotation"

  linker:
    model_name: "deepseek/deepseek-v4-pro"
    provider: "commandcode"
    thinking: disabled
    description: "Graph resolver agent for entity resolution and passage linking"

  answer_mapper:
    model_name: "phatchau036/minimax-m3"
    provider: "xah"
    description: "LLM model for mapping unstructured answer keys to questions"

logging:
  dir: "ocr_logs"
  enabled: true

server:
  host: "0.0.0.0"
  port: 8000
